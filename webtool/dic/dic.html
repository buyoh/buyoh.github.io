<html>
<head>

<title>dic!</title>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="../../common/bootstrap.min.css" />
<link rel="stylesheet" href="../../common/bootstrap-theme.min.css" />
<script src="../../common/jquery-3.1.0.min.js"></script>
<script src="../../common/bootstrap.min.js"></script>

<link rel="stylesheet" href="dic.css" />
<script src="dic.js"></script>

</head>

<body>

<nav class="navbar navbar-fixed-top" role="navigation">
<div class="container jumbotron">
	<h2>dic ver-0.3.0</h2>
	<p>
		<div><input type="text" placeholder="keyword" id="input_keyword" class="form-control"></div>
		<div><input type="text" placeholder="description" id="input_description" class="form-control"></div>
		<div><input type="button" value="append/update" id="button_appenditem" class="btn btn-info">
		     <input type="button" value="remove" id="button_removeitem" class="btn btn-warning" disabled="disabled"> | 
		     <input type="button" value="hidden" id="button_hiddendetail" class="btn btn-default"> | 
		     <input type="button" value="quiz" class="btn btn-default" data-toggle="modal" data-target="#modal_quiz" id="button_startquiz"></div>
	</p>
	<p>
		<div><input type="button" value="json" class="btn btn-default" data-toggle="modal" data-target="#modal_viewJson" id="button_modaljson"></div>
	</p>
</div>
</nav>

<div class="container">
	<dl id="div_wordlist" class="dl-horizontal">
	</dl>

	<div id="modal_viewJson" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="label_modal_viewJson">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h3 class="modal-title" id="label_modal_viewJson">Json</h3>
				</div>
				<div class="modal-body">
					<div><textarea style="width:300px;height:200px;" id="textarea_json"></textarea></div>
				</div>
				<div class="modal-footer">
					<input type="button" value="apply" id="button_jsonapply" class="btn btn-primary" aria-hidden="true">
					<input type="button" value="close" class="btn btn-default" data-dismiss="modal" aria-hidden="true">
				</div>
			</div>
		</div>
	</div>

	<div id="modal_quiz" class="modal fade" tabindex="-1" role="dialog" aria-labelledby="label_modal_quiz">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h3 class="modal-title" id="label_modal_quiz">Quiz</h3>
				</div>
				<div class="modal-body">
					<h4 id="modal_quiz_word"></h4>
					<div id="modal_quiz_selector">
						<input type="button" class="btn btn-primary btn-block" value="A">
						<input type="button" class="btn btn-primary btn-block" value="B">
						<input type="button" class="btn btn-primary btn-block" value="C">
					</div>
				</div>
				<div class="modal-footer">
					<input type="button" value="close" class="btn btn-default" data-dismiss="modal" aria-hidden="true">
				</div>
			</div>
		</div>
	</div>
</div>



</body>

</html>
