<html>
    <head>

        <title>Lunatic Brain (advanced brainfuck interpreter)</title>
        
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

        <link rel="stylesheet" href="../../common/bootstrap.min.css">
        <link rel="stylesheet" href="../../common/bootstrap-theme.min.css">
        <script src="../../common/jquery-3.4.1.min.js"></script>
        <script src="../../common/bootstrap.min.js"></script>

        <script src="../../common/ace/ace.js"></script>
        <script src="../../common/ace/ext-language_tools.js"></script>

        <link rel="stylesheet" href="../../common/jquery-ui.min.css">
        <link rel="stylesheet" href="../../common/jquery-ui.theme.min.css">

        <script src="mystringIO.js"></script>
        <script src="interpreter.js"></script>
        <script src="bfi.js"></script>

        <style type="text/css">
        body{
            font-family: "ヒラギノ角ゴ Pro W3", "Hiragino Kaku Gothic Pro", Osaka, "メイリオ", Meiryo, sans-serif;
        }
        </style>
    </head>

    <body>

        <div class="container">
            <h1>Lunatic Brain <small>(advanced brainfuck interpreter)</small></h1>

            <div class="rows">
                <div class="col-xs-offset-1 col-xs-10">
                    <div class="panel panel-default" id="div_editor">
                        <div class="container-fluid" id="aceditor" style="height:300px;"></div>
                    </div>
                </div>
            </div>

            <div class="rows">
                <div class="col-xs-offset-1 col-xs-10">
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            STDIN
                        </div>
                        <div class="panel-body">
                            <textarea class="container form-control" id="txt_stdin" rows="5"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="rows">
                <div class="col-xs-offset-1 col-xs-10">
                    <div class="panel panel-default">
                        <div class="panel-heading">
                            STDOUT
                        </div>
                        <div class="panel-body">
                            <!-- <div class="well" id="txt_stdout" style="height:200px;"></div> -->
                            <textarea class="container form-control disabled" id="txt_stdout" rows="5"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="rows">
                <div class="col-xs-offset-1 col-xs-10">
                    <div class="panel panel-default">
                        <div class="panel-body">
                            <p>
                                <button class="btn btn-primary" onclick="execute_bfi()" id="btn_run">run</button>
                                <button class="btn btn-primary" onclick="halt_bfi()" id="btn_halt" disabled>halt</button>
                            </p>
                            <p>
                                <label for="txt_limitmem">MemorySize[cell]</label><input type="text" id="txt_limitmem" value="102000" size="9">
                                <label for="txt_limitstk">StackLimit[cell]</label><input type="text" id="txt_limitstk" value="102000" size="9">
                                <label for="txt_limitstd">StdOutLimit[cell]</label><input type="text" id="txt_limitout" value="2000" size="9">
                            </p>
                            <p class="well well-sm" id="div_state">
                                state
                            </p>
                            <p>
                                sampleや言語仕様等は<a href="./spec.html">こちらを参照</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!--
            <div class="rows">
                <div class="col-xs-offset-1 col-xs-10">
                    <div class="panel panel-default">
                        <div class="panel-body">
                            <ul>
                                <li>
                                    
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            -->
        </div>

        <hr>

        <div style="margin-bottom:200px;"></div>

    </body>
</html>
