<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
<script src="https://d3js.org/d3.v4.min.js"></script>

    <script src="./main.js"></script>
    <link rel="stylesheet" href="./main.css">
</head>

<body>
    <div id="div_inputbox">
        <select id="in_param">
            <option value="id">yukicoder ID</option>
            <option value="name">namae</option>
            <option value="twitter">twitter ID</option>
        </select>
        <label for="in_userID">userID</label><input type="text" id="in_userID">
        <button id="btn_execute">Go</button>
    </div>

    <div class="iblock">
        <div>解いたタグ</div>
        <svg id="svg_solved"
            width="800"
            height="800"
            font-family="sans-serif"
            font-size="11"
            text-anchor="middle"
        ></svg>
    </div>
    <div class="iblock">
        <div>解いていないタグ</div>
        <svg id="svg_unsolved"
            width="800"
            height="800"
            font-family="sans-serif"
            font-size="11"
            text-anchor="middle"
        ></svg>
    </div>
