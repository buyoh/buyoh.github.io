        <title>canvas practice 01 -cellimages-</title>

        <script type="text/javascript">

var cvContext = null;
var cvWidth, cvHeight;

var buffContext = null;
var buffCanvas = null;

var destinationMap = null;

var graph = {'n':null,'m':null,'adjacent':null,'edges':null};
var graph_drawing = {'pos':null};

var zoom = 1;
var offsetX = 0, offsetY = 0;

// 初めに呼び出される
$(document).ready(function(){
	var canvasDom = $('#canvas_main')[0];
	cvContext = canvasDom.getContext('2d');
	cvWidth  = canvasDom.width;
	cvHeight = canvasDom.height;

    buffCanvas = $('<canvas></canvas>')[0];
    buffCanvas.width = cvWidth; buffCanvas.height = cvHeight;
    buffContext = buffCanvas.getContext('2d');

    $('#canvas_main').on('mousedown',function(e){
        mousedown_canvas(rv_X(e.offsetX), rv_Y(e.offsetY));
    });
    $('#canvas_main').on('mousemove',function(e){
        mousemove_canvas(rv_X(e.offsetX), rv_Y(e.offsetY));
    });
    $('#canvas_main').on('mouseup',function(e){
        mouseup_canvas(rv_X(e.offsetX), rv_Y(e.offsetY));
    });
    click_load();
});

function click_load(){
    if (!loadGraph($('#datainput').val())) return;
    initializeGraphPosition();
    fitScreen();
    paint();
}

var timer = null;
function click_tuneup(){
    if (timer === null)
        timer = setInterval(function(){tuneupGraphPosition(); fitScreen(); paint();},50);
    else{
        clearInterval(timer);timer = null;
    }
}


var dragTrigger = false;
function mousedown_canvas(x,y){
    var nearest = false;
    var dist;
    for (var i = 0; i < graph.n; ++i){
        var p = graph_drawing.pos[i];
        var d = Math.hypot(p.x-x,p.y-y);
        if (d < 32 && (nearest === false || d < dist)){
            nearest = i;
            dist = d;
        }
    }
    dragTrigger = nearest;
}

function mousemove_canvas(x,y){
    if (dragTrigger === false) return;
    console.log(dragTrigger);
    graph_drawing.pos[dragTrigger].x = x;
    graph_drawing.pos[dragTrigger].y = y;
    paint();
}

function mouseup_canvas(x,y){
    dragTrigger = false;
}


// グラフの座標を適当に決める
function initializeGraphPosition(){
    graph_drawing = {'pos':new Array(graph.n)};
    for (var i = 0; i < graph.n; ++i){
        graph_drawing.pos[i] = {'x':i*50 , 'y':Math.random()*100+50};
    }
}

// グラフの位置を改善する
// 計算量はなるべくO(N^2+M^2+NM)におさまるよう
function tuneupGraphPosition(){
    var force = new Array(graph.n);
    var weight = new Array(graph.n);
    for (var i = 0; i < graph.n; ++i){
        force[i] = {'x':0, 'y':0};
        weight[i] = 0.1;
    }
    
    for (var i = 0; i < graph.m - 1; ++i){
        for (var j = i+1; j < graph.m; ++j){
            var e1 = graph.edges[i];
            var e2 = graph.edges[j];
            var p1 = graph_drawing.pos[e1[0]];
            var p2 = graph_drawing.pos[e1[1]];
            var p3 = graph_drawing.pos[e2[0]];
            var p4 = graph_drawing.pos[e2[1]];
            
            if (intersection(p1,p2,p3,p4)){
                var f1,f2;
                var d1,d2;
                d1 = Math.hypot(p1.x-p2.x,p1.y-p2.y);
                d2 = Math.hypot(p3.x-p4.x,p3.y-p4.y)
                if (d1 > d2){
                    f1=d1;f2=-d2;
                }else{
                    f1=-d1;f2=d2;
                }
                if (p1.x != p2.x){
                    force[e1[0]].x += f1*3/ (p1.x-p2.x);
                    force[e1[1]].x -= f1*3/ (p1.x-p2.x);
                }
                if (p1.y != p2.y){
                    force[e1[0]].y += f1*3/ (p1.y-p2.y);
                    force[e1[1]].y -= f1*3/ (p1.y-p2.y);
                }
                if (p3.x != p4.x){
                    force[e2[0]].x += f2*3/ (p3.x-p4.x);
                    force[e2[1]].x -= f2*3/ (p3.x-p4.x);
                }
                if (p3.y != p4.y){
                    force[e2[0]].y += f2*3/ (p3.y-p4.y);
                    force[e2[1]].y -= f2*3/ (p3.y-p4.y);
                }
                // weight[e1[0]] = weight[e1[0]]/3*2;
                // weight[e1[1]] = weight[e1[1]]/3*2;
                // weight[e2[0]] = weight[e2[0]]/3*2;
                // weight[e2[1]] = weight[e2[1]]/3*2;
            }
        }
    }

    for (var i = 0; i < graph.n - 1; ++i){
        for (var j = i+1; j < graph.n; ++j){
            var p1 = graph_drawing.pos[i];
            var p2 = graph_drawing.pos[j];
            var d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
                // todo
            if (p1.x != p2.x){
                force[i].x += Math.abs(30-d)/ (p1.x-p2.x);
                force[j].x -= Math.abs(30-d)/ (p1.x-p2.x);
            }
            if (p1.y != p2.y){
                force[i].y += Math.abs(30-d)/ (p1.y-p2.y);
                force[j].y -= Math.abs(30-d)/ (p1.y-p2.y);
            }
        }
    }

    for (var i = 0; i < graph.n; ++i){
        graph_drawing.pos[i].x += force[i].x / weight[i];
        graph_drawing.pos[i].y += force[i].y / weight[i];
    }
}


// 描画呼び出し
function paint(){
	buffContext.fillStyle='#fff';
	buffContext.fillRect(0, 0, cvWidth, cvHeight);
    drawGraph();
    cvContext.drawImage(buffCanvas, 0, 0);
}


// グラフを描く
function drawGraph(){
    var visited = new Array(graph.m);

    buffContext.strokeStyle = ('#111');
    buffContext.fillStyle = ('#EEE');

    function dfs(v){
        for (var i = 0; i < graph.adjacent[v].length; ++i){
            var ei = graph.adjacent[v][i];
            if (visited[ei]) continue;
            visited[ei] = true;
            var edge = graph.edges[ei];
            var u = edge[0] == v ? edge[1] : edge[0];
            buffContext.moveTo(cv_X(graph_drawing.pos[v].x), cv_Y(graph_drawing.pos[v].y));
            buffContext.lineTo(cv_X(graph_drawing.pos[u].x), cv_Y(graph_drawing.pos[u].y));
            dfs(u);
        }
    }
    buffContext.beginPath();
    dfs(0);
    buffContext.stroke();

    for (var i = 0; i < graph.n; ++i){
        var x = cv_X(graph_drawing.pos[i].x);
        var y = cv_Y(graph_drawing.pos[i].y);
        // buffContext.fillRect(x-16 ,y-16 ,32 ,32);
        // buffContext.strokeRect(x-16 ,y-16 ,32 ,32);
        buffContext.beginPath();
        buffContext.arc(x,y,16,0,2*Math.PI);
        buffContext.fill();
        buffContext.beginPath();
        buffContext.arc(x,y,16,0,2*Math.PI);
        buffContext.stroke();
    }
}

// strからグラフを生成する
function loadGraph(str){
    var list = splitmap(str, function(e){return e-0;});
    var n = list.shift();
    var m = list.shift();
    if (n === undefined || m === undefined || list.length < m*2){
        console.error("failure: loadGraph"); return false;
    }
    graph = {'n' : n , 'm' : m , 'adjacent' : new Array(n) , 'edges' : new Array(m)};
    for (var i = 0; i < n; ++i){
        graph.adjacent[i] = new Array();
    }
    for (var i = 0; i < m; ++i){
        var a = list.shift();
        var b = list.shift();
        graph.adjacent[a].push(i);
        graph.adjacent[b].push(i);
        graph.edges[i] = [a, b];
    }
    return true;
}

// convert X
function cv_X(x){
    return (x-offsetX)*zoom;
}
// convert Y
function cv_Y(y){
    return (y-offsetY)*zoom;
}
function rv_X(x){
    return x/zoom+offsetX;
}
// convert Y
function rv_Y(y){
    return y/zoom+offsetY;
}

function fitScreen(){
    if (!graph.n) return;
    var minx,miny,maxx,maxy;
    minx = maxx = graph_drawing.pos[0].x;
    miny = maxy = graph_drawing.pos[0].y;

    for (var i = 1; i < graph.n; ++i){
        var p = graph_drawing.pos[i];
        minx = Math.min(minx, p.x);
        miny = Math.min(miny, p.y);
        maxx = Math.max(maxx, p.x);
        maxy = Math.max(maxy, p.y);
    }

    minx -= 40;
    miny -= 40;
    maxx += 40;
    maxy += 40;

    offsetX = minx;
    offsetY = miny;
    zoom = Math.min(cvWidth/(maxx-minx), cvHeight/(maxy-miny));

    offsetX -= (cvWidth - cv_X(maxx) + cv_X(minx)) / 2;
    offsetY -= (cvHeight- cv_Y(maxy) + cv_Y(miny)) / 2;
}


// 文字列strを/\s/で分割，各要素をmap(要素)で置換
function splitmap(str, map){
    return str.split(/\s/).reduce(function(prev,val,idx,arr){
        if (val.length != 0)
            prev.push(map(val));
        return prev;
    },new Array());
}

// http://www5d.biglobe.ne.jp/~tomoya03/shtml/algorithm/Intersection.htm
// 座標 p1,p2 を結ぶ線分と座標 p3,p4 を結ぶ線分が交差しているか
function intersection(p1, p2, p3, p4){
    return intersect(p1,p2,p3,p4) && intersect(p3,p4,p1,p2);
}

// http://www5d.biglobe.ne.jp/~tomoya03/shtml/algorithm/Intersection.htm
// 座標 p1,p2 を通る直線と座標 p3,p4 を結ぶ線分が交差しているか
function intersect(p1, p2, p3, p4){
    return ((p1.x - p2.x) * (p3.y - p1.y) + (p1.y - p2.y) * (p1.x - p3.x)) * 
           ((p1.x - p2.x) * (p4.y - p1.y) + (p1.y - p2.y) * (p1.x - p4.x)) < 0;
}

        </script>
