<!DOCTYPE html>

<html>
<head>

<title>sushi particle</title>

<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="../../common/bootstrap.min.css">
<script src="../../common/jquery-3.1.0.min.js"></script>
<script src="../../common/bootstrap.min.js"></script>

<script type="text/javascript">

var sushichar = "🍣";

var gravity = 0.2;
var screenWidth;
var screenHeight;

var sushiarray = new Array();

$(document).ready(function(){
	setInterval(mainloop,25);
    setTimeout(generateSushi,1000);
    updateScreenSize();
});

$(document).resize(updateScreenSize);


function mainloop(){
    for (var i = 0; i < sushiarray.length; i++){
        sushi = sushiarray[i];

        sushi.px += sushi.vx;
        sushi.py += sushi.vy;
        sushi.vy += gravity;

        domTransformTo(sushi.dom, sushi.px, sushi.py);

        if (screenHeight < sushi.py){
            sushi.dom.remove();
            sushiarray.splice(i--, 1);
        }
    }
}

function generateSushi(){
    var dom = $("<span>"+sushichar+"</span>").addClass("flying_object");
    domTransformTo(dom,screenWidth/2, screenHeight/4);

    dom.appendTo($("#the-nice-division"));

    sushiarray.push({"dom":dom, "px":screenWidth/2, "py":screenHeight/4, "vx":(rand()-0.5)*10, "vy":(-rand())*10});

    setTimeout(generateSushi,80);
}


function domTransformTo(dom, x, y){
    dom.css("transform","");
    dom.css("transform","translate("+x+"px,"+y+"px)");
}

function updateScreenSize(){
    var dom = $(document);
    screenWidth = dom.width();
    screenHeight = dom.height();
}

function rand(){
    return Math.random();
}

</script>

<style type="text/css">
.flying_object{
    position:absolute;
    transition-property:transform;
    transition-duration:0.1s;
    font-size:40px;
}
</style>


</head>

<body>

    <div id="the-nice-division">


    </div>

</body>
</html>
